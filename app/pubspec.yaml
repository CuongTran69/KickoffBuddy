name: kickoff_buddy
description: "Football companion: timezone-aware kickoff, spoiler protection, rule cards"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.6.2

  # Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # Time
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # i18n
  intl: ^0.20.2

  # UI
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2807.0
  flag: ^7.0.0
  app_settings: ^5.1.1

  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.1

  # Network
  http: ^1.2.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  # custom_lint: omitted — isar_generator 3.x does not require it
  # riverpod_lint: omitted — conflicts with isar_generator 3.x analyzer version (D1 fallback)
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - store_assets/icon/

  # Inter loaded via google_fonts package, no manual font files needed

flutter_launcher_icons:
  image_path: "store_assets/icon/source-1024.png"
  android: true
  ios: true
  min_sdk_android: 23
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "store_assets/icon/source-1024.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0F172A"
  image: "store_assets/icon/source-1024.png"
  android: true
  ios: true

